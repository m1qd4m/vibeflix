name: vibeflix
description: AI-powered movie recommendation app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.3
  cloud_firestore: ^4.15.4
  google_sign_in: ^6.2.1
  flutter_riverpod: ^2.5.1
  dio: ^5.4.3
  cached_network_image: ^3.3.1
  flutter_dotenv: ^5.1.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  go_router: ^13.2.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  url_launcher: ^6.2.6
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
